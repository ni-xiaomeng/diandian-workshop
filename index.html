<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>点点工坊</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=20260423p">
</head>
<body>
  <main class="app">
    <header class="brand">
      <h1 class="brand__title">点点工坊</h1>
      <p class="brand__tag">画板与转图 · 导出 PNG</p>
    </header>

    <section class="mode-switch mac-tabs" role="tablist" aria-label="功能切换">
      <button
        id="tabConvert"
        class="mac-tab active"
        type="button"
        role="tab"
        aria-selected="true"
        aria-controls="panelConvert"
      >导入图片转像素</button>
      <button
        id="tabDraw"
        class="mac-tab"
        type="button"
        role="tab"
        aria-selected="false"
        aria-controls="panelDraw"
      >画板</button>
    </section>

    <section class="feature-stack">
      <article
        class="panel feature-panel is-active mac-window"
        id="panelConvert"
        role="tabpanel"
        aria-labelledby="tabConvert"
        aria-hidden="false"
      >
        <h2 class="mac-window__bar">导入图片转像素</h2>
        <div class="mac-window__body">
          <input
            type="file"
            id="imageFileInput"
            class="visually-hidden"
            accept="image/*"
            tabindex="-1"
            aria-hidden="true"
          />
          <div class="convert-layout">
            <div class="convert-sidebar">
              <div
                class="source-slot source-slot--sidebar convert-sidebar__btn"
                id="sourceSlot"
                title="点击选择图片，拖拽图片到此处，或 Ctrl+V（Mac：Cmd+V）粘贴"
                aria-live="polite"
                tabindex="0"
              >
                <div class="source-slot__empty" id="sourceSlotEmpty">导入</div>
                <div class="source-slot__inner" id="sourceSlotInner" hidden>
                  <img id="convertThumbPreview" class="source-slot__img" alt="图源缩略图" />
                  <div class="source-slot__overlay">
                    <button type="button" class="source-slot__clear" id="clearImportBtn" aria-label="删除图片">×</button>
                  </div>
                </div>
              </div>
              <button id="exportConvertBtn" type="button" class="convert-sidebar__btn">导出</button>
              <button id="sendToDrawBtn" type="button" class="convert-sidebar__btn">发送到画板</button>
              <div class="draw-sidebar__divider" aria-hidden="true"></div>
              <span class="convert-sidebar__caption">像素格</span>
              <div class="convert-sidebar__size" aria-live="polite">
                <input id="convertGridCols" type="text" inputmode="numeric" pattern="[0-9]*" value="32" aria-label="宽" class="grid-size-input" maxlength="3" />
                <span class="grid-size-x">×</span>
                <input id="convertGridRows" type="text" inputmode="numeric" pattern="[0-9]*" value="32" aria-label="高" class="grid-size-input" maxlength="3" />
              </div>
              <input id="convertGridColsRange" type="range" min="1" max="200" step="1" value="32" aria-label="宽（滑动）" class="convert-sidebar__range" />
              <input id="convertGridRowsRange" type="range" min="1" max="200" step="1" value="32" aria-label="高（滑动）" class="convert-sidebar__range" />
              <label class="check-label check-label--small"><input type="checkbox" id="convertLockAspect" checked /> 锁定比例</label>
              <label class="check-label check-label--small"><input type="checkbox" id="convertSmartColor" checked /> 智能归色</label>
              <label class="check-label check-label--small"><input type="checkbox" id="showConvertOriginal" disabled /> 对照原图</label>
              <div class="draw-sidebar__divider" aria-hidden="true"></div>
              <div class="convert-sidebar__guide">
                <label class="check-label check-label--small"><input type="checkbox" id="convertGuideOn" /> 辅助线</label>
                <div class="convert-sidebar__guide-sub">
                  <input id="convertGuideInterval" type="text" inputmode="numeric" pattern="[0-9]*" value="5" class="grid-size-input convert-sidebar__guide-interval" title="间隔（2–20）" maxlength="2" />
                  <div class="convert-sidebar__guide-color-field" title="辅助线颜色">
                    <span id="convertGuideColorPreview" class="guide-color-preview guide-color-preview--tiny" aria-hidden="true"></span>
                    <input type="color" id="convertGuideColor" value="#ff0000" class="guide-color-native guide-color-native--tiny" />
                  </div>
                </div>
              </div>
              <div class="draw-sidebar__divider" aria-hidden="true"></div>
              <span class="convert-sidebar__caption">颜色提取</span>
              <input type="range" id="convertColorExtractRange" min="1" max="100" value="50" step="1" aria-label="颜色提取强度" class="convert-sidebar__range" />
              <div class="convert-sidebar__extract-labels">
                <span>少</span>
                <span id="convertColorExtractVal" class="convert-sidebar__extract-val">50</span>
                <span>多</span>
              </div>
              <label class="check-label check-label--small"><input type="checkbox" id="priorityValue" /> 明度优先</label>
              <label class="check-label check-label--small"><input type="checkbox" id="priorityHue" checked /> 色相优先</label>
            </div>
            <div class="convert-canvas-area">
              <div class="canvas-wrap canvas-wrap--convert">
                <div class="convert-view-stack">
                  <canvas id="convertCanvas" width="512" height="512"></canvas>
                  <img
                    id="convertOriginalView"
                    class="convert-original-view"
                    alt=""
                    decoding="async"
                    aria-hidden="true"
                  />
                </div>
              </div>
            </div>
          </div>
          <div class="color-stats">
            <div class="color-stats__title">颜色统计</div>
            <div id="convertColorSummary" class="color-stats__summary">共 0 种颜色</div>
            <div id="convertColorSwatches" class="color-stats__swatches"></div>
          </div>
        </div>
      </article>

      <article
        class="panel feature-panel mac-window"
        id="panelDraw"
        role="tabpanel"
        aria-labelledby="tabDraw"
        aria-hidden="true"
      >
        <h2 class="mac-window__bar">画板</h2>
        <div class="mac-window__body">
          <div class="draw-layout">
            <div class="draw-sidebar">
              <button id="selectBtn" type="button" class="draw-sidebar__btn" title="选择对象，拖拽移动，拽角缩放，Enter确认，Delete删除">选择</button>
              <button id="rotateObjBtn" type="button" class="draw-sidebar__btn" style="display:none" title="旋转选中对象 45°（快捷键 R）">旋转</button>
              <button id="penBtn" type="button" class="draw-sidebar__btn active" title="画笔">画笔</button>
              <button id="eraserBtn" type="button" class="draw-sidebar__btn" title="橡皮">橡皮</button>
              <button id="eyedropperBtn" type="button" class="draw-sidebar__btn" title="吸色（E / I）">吸色</button>
              <button id="drawPanBtn" type="button" class="draw-sidebar__btn" title="拖动平移画布">移动</button>
              <div class="draw-sidebar__divider"></div>
              <button id="textBtn" type="button" class="draw-sidebar__btn" title="点击格子输入像素字">文字</button>
              <button id="rectBtn" type="button" class="draw-sidebar__btn" title="拖拽矩形；Shift 正方形">方形</button>
              <button id="ellipseBtn" type="button" class="draw-sidebar__btn" title="拖拽椭圆；Shift 正圆">圆形</button>
              <button id="fillBtn" type="button" class="draw-sidebar__btn" title="点击填充相同颜色的连通区域">填充</button>
              <div class="draw-sidebar__divider"></div>
              <div class="draw-sidebar__undo-group">
                <button id="undoDrawBtn" type="button" class="draw-sidebar__undo-btn" disabled title="撤回 Ctrl+Z / ⌘Z">↩</button>
                <button id="redoDrawBtn" type="button" class="draw-sidebar__undo-btn" disabled title="反撤回 Ctrl+Shift+Z / ⌘⇧Z">↪</button>
              </div>
              <button id="clearBtn" type="button" class="draw-sidebar__btn" title="清空画布">清空</button>
              <div class="draw-sidebar__divider"></div>
              <button id="drawZoomIn" type="button" class="draw-sidebar__btn" title="放大">+</button>
              <span id="drawZoomLabel" class="draw-sidebar__zoom">100%</span>
              <button id="drawZoomOut" type="button" class="draw-sidebar__btn" title="缩小">−</button>
              <button id="drawZoomReset" type="button" class="draw-sidebar__btn" title="重置 100%">1:1</button>
              <div class="draw-sidebar__divider"></div>
              <button id="exportDrawBtn" type="button" class="draw-sidebar__btn" title="导出 PNG">导出</button>
              <div class="draw-sidebar__divider"></div>
              <div class="draw-sidebar__guide">
                <label class="check-label check-label--small"><input type="checkbox" id="drawGuideOn" /> 辅助线</label>
                <div class="draw-sidebar__guide-size-row">
                  <input id="drawGuideInterval" type="text" inputmode="numeric" pattern="[0-9]*" value="5" class="grid-size-input" title="间隔（2–20）" maxlength="2" />
                  <div class="draw-sidebar__guide-color-field" title="辅助线颜色">
                    <span id="drawGuideColorPreview" class="guide-color-preview" aria-hidden="true"></span>
                    <input type="color" id="drawGuideColor" value="#ff0000" class="guide-color-native" />
                  </div>
                </div>
              </div>
              <div class="draw-sidebar__divider"></div>
              <div class="draw-sidebar__size" id="drawGridSizeLabel" aria-live="polite"><input id="drawGridColsInput" type="text" inputmode="numeric" pattern="[0-9]*" value="32" class="grid-size-input" title="宽度"><span class="grid-size-x">×</span><input id="drawGridRowsInput" type="text" inputmode="numeric" pattern="[0-9]*" value="32" class="grid-size-input" title="高度"></div>
            </div>

            <div class="draw-canvas-area">
              <div class="edge-btn edge-btn--top">
                <button type="button" id="edgeTopMinus" class="grid-edge-btn" aria-label="上侧减一行" title="上侧减一行">−</button>
                <button type="button" id="edgeTopPlus" class="grid-edge-btn" aria-label="上侧加一行" title="上侧加一行">+</button>
              </div>
              <div class="edge-btn edge-btn--bottom">
                <button type="button" id="edgeBottomMinus" class="grid-edge-btn" aria-label="下侧减一行" title="下侧减一行">−</button>
                <button type="button" id="edgeBottomPlus" class="grid-edge-btn" aria-label="下侧加一行" title="下侧加一行">+</button>
              </div>
              <div class="edge-btn edge-btn--left">
                <button type="button" id="edgeLeftMinus" class="grid-edge-btn" aria-label="左侧减一列" title="左侧减一列">−</button>
                <button type="button" id="edgeLeftPlus" class="grid-edge-btn" aria-label="左侧加一列" title="左侧加一列">+</button>
              </div>
              <div class="edge-btn edge-btn--right">
                <button type="button" id="edgeRightMinus" class="grid-edge-btn" aria-label="右侧减一列" title="右侧减一列">−</button>
                <button type="button" id="edgeRightPlus" class="grid-edge-btn" aria-label="右侧加一列" title="右侧加一列">+</button>
              </div>
              <div class="canvas-wrap draw-workspace__canvas">
                <div
                  class="draw-zoom-viewport"
                  id="drawZoomViewport"
                  title="拖动：移动模式、中键或按住空格拖移。缩放：Ctrl/⌘+滚轮"
                >
                  <div class="draw-zoom-inner" id="drawZoomInner">
                    <canvas id="drawCanvas" width="512" height="512"></canvas>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="draw-color-float" id="drawColorFloat" role="dialog" aria-label="取色悬浮窗">
            <div
              class="draw-color-float__title"
              id="drawColorFloatBar"
              title="拖动标题栏可移动窗口"
            ><span>取色</span><button type="button" class="draw-color-float__toggle" id="drawColorFloatToggle" title="收起/展开">−</button></div>
            <div class="draw-color-float__body">
              <div class="draw-color-float__sv-wrap">
                <div class="sv-hue-picker" id="svHuePickerRoot">
                  <canvas id="colorSb" class="sv-hue-picker__sb" width="200" height="200" aria-label="饱和度与明度"></canvas>
                  <canvas id="colorHue" class="sv-hue-picker__hue" width="22" height="200" aria-label="色相"></canvas>
                </div>
              </div>
              <div class="picker-meta picker-meta--draw">
                <span class="picker-meta__label">当前颜色</span>
                <input type="hidden" id="colorPicker" value="#4a3428" />
                <div id="colorPreview" role="img" aria-label="当前颜色预览" title="在上方色谱中选择颜色"></div>
              </div>
            </div>
            <div class="draw-color-float__handle" data-corner="nw"></div>
            <div class="draw-color-float__handle" data-corner="ne"></div>
            <div class="draw-color-float__handle" data-corner="sw"></div>
            <div class="draw-color-float__handle" data-corner="se"></div>
          </div>
          <div class="color-stats">
            <div class="color-stats__title">颜色统计</div>
            <div id="drawColorSummary" class="color-stats__summary">共 0 种颜色</div>
            <div id="drawColorSwatches" class="color-stats__swatches"></div>
          </div>
        </div>
      </article>
    </section>
  </main>

  <script src="app.js?v=20260423p"></script>
</body>
</html>
